# -----------------------------------------------------------------------------
# ExternalSecret — pulls secrets from Vault and materialises them as a
# Kubernetes Secret ({{ include "hello-world.secretName" . }}) in this namespace.
#
# Flow:
#   Vault KV v2  →  ESO ClusterSecretStore (vault-backend)
#               →  ExternalSecret (this resource)
#               →  Kubernetes Secret ({{ include "hello-world.secretName" . }})
#               →  Pod env vars (DB_PASSWORD, API_KEY, SECRET_MESSAGE)
#
# Vault path:   secret/{{ .Values.vault.secretPath }}
# Populate via: vault kv put secret/{{ .Values.vault.secretPath }} \
#                 db_password="..." api_key="..." secret_message="..."
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "hello-world.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello-world.labels" . | nindent 4 }}
spec:
  # ESO re-reads Vault and updates the k8s Secret on this interval.
  # If the secret changes in Vault, the pod will NOT automatically restart —
  # use Reloader (https://github.com/stakater/Reloader) if live rotation is needed.
  refreshInterval: {{ .Values.vault.refreshInterval | quote }}

  secretStoreRef:
    name: {{ .Values.vault.secretStoreRef.name }}
    kind: {{ .Values.vault.secretStoreRef.kind }}

  target:
    # Name of the Kubernetes Secret that ESO will create/own in this namespace
    name: {{ include "hello-world.secretName" . }}
    # Owner: ESO manages the lifecycle of this Secret — it is deleted when the
    # ExternalSecret is deleted.
    creationPolicy: Owner
    # Merge: if other controllers also write to this Secret, preserve their keys.
    # Use Owner (default) to let ESO own the Secret exclusively.
    deletionPolicy: Retain

  # Explicit key mappings from Vault → Kubernetes Secret.
  # Each entry reads one property from the Vault KV secret and writes it
  # as a key in the resulting Kubernetes Secret.
  data:
    {{- range .Values.vault.secrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        # KV v2 path — ESO prepends /data/ automatically when version=v2
        key: {{ $.Values.vault.secretPath }}
        property: {{ .vaultKey }}
    {{- end }}

  # Alternative: use dataFrom to pull ALL keys from a Vault path at once.
  # Uncomment to replace the explicit `data` block above.
  # dataFrom:
  #   - extract:
  #       key: {{ .Values.vault.secretPath }}
