apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hello-world.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello-world.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hello-world.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hello-world.labels" . | nindent 8 }}
      annotations:
        # Restart pods when the ESO-managed secret changes.
        # This annotation is updated by Reloader (stakater/Reloader) if installed,
        # or you can trigger it manually: kubectl rollout restart deployment/{{ include "hello-world.fullname" . }}
        checksum/secret: "vault-managed"
    spec:
      serviceAccountName: {{ include "hello-world.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # The initContainer blocks the app from starting until the ExternalSecret
      # has been resolved and the Kubernetes Secret exists. Without this guard,
      # the pod would crash-loop if ESO hasn't synced yet (e.g. on first deploy).
      initContainers:
        - name: wait-for-secret
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for secret {{ include "hello-world.secretName" . }} to be populated by ESO..."
              until [ "$(cat /vault-secrets/secret-message 2>/dev/null | wc -c)" -gt "0" ]; do
                echo "  Secret not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "Secret is ready."
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
              readOnly: true

      containers:
        - name: hello-world
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # Secrets are injected as environment variables by Kubernetes — the
          # actual values come from Vault via ESO. The app never talks to Vault
          # directly; it just reads standard env vars.
          env:
            {{- range .Values.vault.secrets }}
            - name: {{ .envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "hello-world.secretName" $ }}
                  key: {{ .secretKey }}
            {{- end }}
            # Non-secret config can still use plain env vars or ConfigMaps
            - name: APP_ENV
              value: {{ .Release.Namespace | quote }}
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}

          # Also mount the secret as files — useful for secrets that are
          # consumed as files (TLS certs, config files, etc.)
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault-secrets
              readOnly: true

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        # Project the ESO-managed Kubernetes Secret into a read-only volume.
        # Each secret key becomes a file: /vault-secrets/<key>
        - name: vault-secrets
          secret:
            secretName: {{ include "hello-world.secretName" . }}
            defaultMode: 0400
