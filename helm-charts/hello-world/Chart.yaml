apiVersion: v2
name: hello-world
description: >
  Hello World Python app demonstrating ESO + Vault secret injection.
  An ExternalSecret pulls secrets from Vault via the vault-backend
  ClusterSecretStore and surfaces them as a Kubernetes Secret that
  the pod consumes as environment variables.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - hello-world
  - vault
  - external-secrets
