apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: vault
  namespace: vault
spec:
  # jobLabel sets the Prometheus `job` label to the value of this pod label
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
      component: server
  podMetricsEndpoints:
    - port: http
      path: /v1/sys/metrics
      params:
        format: [prometheus]
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
