{{- if .Values.apps.k8sMonitoring.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring-{{ .Values.env }}
  namespace: {{ .Values.argoCDNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.apps.k8sMonitoring.syncWave | quote }}
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: vault-eso/argocd/app-default-values/k8s-monitoring
  destination:
    name: {{ .Values.env }}
    namespace: {{ .Values.apps.k8sMonitoring.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
{{- end }}
