# Prod environment overrides
# Replace all <PLACEHOLDER> values before applying

server:
  extraEnvironmentVars:
    AWS_ROLE_SESSION_NAME: vault
    AWS_ROLE_ARN: "arn:aws:iam::<PROD_AWS_ACCOUNT_ID>:role/vault-prod"
    AWS_DEFAULT_REGION: us-east-1

  ingress:
    hosts:
      - host: vault-server.prod.<YOUR_DOMAIN>

  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::<PROD_AWS_ACCOUNT_ID>:role/vault-prod"

  ha:
    raft:
      config: |
        ui = true
        cluster_name = "vault-cluster"
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          telemetry {
            unauthenticated_metrics_access = "true"
          }
        }
        storage "raft" {
          path = "/vault/data"
          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }
        seal "awskms" {
          region     = "us-east-1"
          kms_key_id = "<PROD_KMS_KEY_ARN>"
        }
        service_registration "kubernetes" {}
