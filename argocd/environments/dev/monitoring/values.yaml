prometheus:
  prometheusSpec:
    replicas: 1
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 20Gi
    thanos:
      objectStorageConfig:
        secret:
          config:
            bucket: thanos-dev
            region: <AWS_REGION>
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::<DEV_AWS_ACCOUNT_ID>:role/thanos-dev

grafana:
  adminPassword: <GRAFANA_ADMIN_PASSWORD>
  ingress:
    hosts:
      - grafana.dev.<YOUR_DOMAIN>

alertmanager:
  alertmanagerSpec:
    replicas: 1
  ingress:
    hosts:
      - alertmanager.dev.<YOUR_DOMAIN>
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: [alertname, namespace]
    route:
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      receiver: slack-dev
    receivers:
      - name: slack-dev
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-credentials/slack_webhook_url
            channel: '#dev-alerts'
            send_resolved: true
            color: >-
              {{ if eq .Status "firing" }}
                {{ if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}
              {{ else }}good{{ end }}
            title: >-
              {{ if eq .Status "firing" }}:fire:{{ else }}:white_check_mark:{{ end }}
              [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
              ({{ .Alerts | len }} alert{{ if gt (len .Alerts) 1 }}s{{ end }})
            text: |-
              {{ range .Alerts }}
              *Namespace:* {{ .Labels.namespace }}
              *Severity:* {{ .Labels.severity | toUpper }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            footer: "dev cluster"
