apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-eso-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/iahmad-khan/infrastructure-as-code
    targetRevision: HEAD
    path: vault-eso/argocd/apps
    helm:
      valueFiles:
        - ../environments/dev/values.yaml
        - ../app-versions-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
