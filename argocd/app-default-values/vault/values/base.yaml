global:
  enabled: true
  tlsDisable: true

injector:
  enabled: false

server:
  image:
    repository: "hashicorp/vault"
    tag: "1.20.1"
  enabled: true
  logLevel: "info"
  logFormat: "standard"

  resources:
    requests:
      memory: 256Mi
      cpu: 256m
    limits:
      memory: 512Mi
      cpu: 512m

  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    ingressClassName: "nginx"
    pathType: Prefix
    activeService: true

  dataStorage:
    enabled: true
    size: 20Gi
    mountPath: "/vault/data"
    storageClass: gp3
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: true
    size: 30Gi
    mountPath: "/vault/logs"
    storageClass: gp3
    accessMode: ReadWriteOnce

  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true

ui:
  enabled: true
