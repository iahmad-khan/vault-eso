apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-credentials
    creationPolicy: Owner
  data:
    - secretKey: slack_webhook_url
      remoteRef:
        key: monitoring/alertmanager
        property: slack_webhook_url
    # pagerduty_routing_key must be populated in all environments.
    # For dev/uat a dummy value is acceptable — it is not referenced by
    # the alertmanager config in those environments.
    - secretKey: pagerduty_routing_key
      remoteRef:
        key: monitoring/alertmanager
        property: pagerduty_routing_key
